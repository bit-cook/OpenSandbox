apiVersion: sandbox.opensandbox.io/v1alpha1
kind: BatchSandbox
metadata:
  name: {{.BatchSandboxName}}
  namespace: {{.Namespace}}
spec:
  replicas: {{.Replicas}}
  poolRef: {{.PoolName}}
  taskTemplate:
    spec:
      process:
        command: ["echo"]
        args: ["Hello from task with preStart"]
        lifecycle:
          preStart:
            exec:
              command: ["/bin/sh", "-c", "echo prestart-ok"]
            execMode: Local
